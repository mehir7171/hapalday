<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>הפלדאי — בחירת פרופיל פלדה</title>
  <style>
    /* ══ CSS VARIABLES ══════════════════════════════════════════ */
    :root {
      --bg:           #f4f6f9;
      --card:         #ffffff;
      --border:       #e2e8f0;
      --text:         #1a202c;
      --text-muted:   #64748b;
      --accent:       #2563eb;
      --accent-light: #eff6ff;
      --accent-dark:  #1d4ed8;
      --green:        #16a34a;
      --green-light:  #f0fdf4;
      --red:          #dc2626;
      --red-light:    #fef2f2;
      --amber:        #d97706;
      --amber-light:  #fffbeb;
      --sidebar-w:    260px;
      --header-h:     60px;
      --radius:       10px;
    }

    /* ══ RESET ══════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
    }
    button { cursor: pointer; font-family: inherit; }
    input, select, textarea { font-family: inherit; }

    /* ══ LAYOUT ═════════════════════════════════════════════════ */
    #layout { display: flex; min-height: 100vh; }

    /* ══ SIDEBAR ════════════════════════════════════════════════ */
    #sidebar {
      width: var(--sidebar-w);
      background: #1e293b;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; right: 0;
      height: 100vh;
      z-index: 100;
      transition: width 0.2s;
    }
    #sidebar.collapsed { width: 56px; }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 20px 16px 16px;
      border-bottom: 1px solid #334155;
      white-space: nowrap;
      overflow: hidden;
    }
    .sidebar-logo-icon { font-size: 26px; flex-shrink: 0; }
    .sidebar-logo-text { font-size: 18px; font-weight: 800; color: #f1f5f9; }
    .sidebar-logo-sub  { font-size: 11px; color: #64748b; margin-top: 1px; }

    .sidebar-nav { flex: 1; padding: 12px 8px; overflow-y: auto; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      color: #94a3b8;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      transition: background 0.15s, color 0.15s;
      border: none;
      background: none;
      width: 100%;
      text-align: right;
    }
    .nav-item:hover  { background: #334155; color: #f1f5f9; }
    .nav-item.active { background: var(--accent); color: #fff; }
    .nav-icon { font-size: 18px; flex-shrink: 0; }
    .nav-label { flex: 1; }

    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid #334155;
      font-size: 12px;
      color: #475569;
      white-space: nowrap;
      overflow: hidden;
    }
    .sidebar-disclaimer {
      font-size: 10px;
      color: #475569;
      line-height: 1.4;
      padding: 8px 16px 12px;
    }

    .sidebar-toggle {
      position: absolute;
      left: -14px;
      top: 50%;
      transform: translateY(-50%);
      width: 28px; height: 28px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: #94a3b8;
      font-size: 11px;
      transition: background 0.15s;
    }
    .sidebar-toggle:hover { background: #334155; color: #fff; }
    #sidebar.collapsed .sidebar-toggle { left: -14px; }
    #sidebar.collapsed .sidebar-logo-text,
    #sidebar.collapsed .sidebar-logo-sub,
    #sidebar.collapsed .nav-label,
    #sidebar.collapsed .sidebar-footer,
    #sidebar.collapsed .sidebar-disclaimer { display: none; }

    /* ══ MAIN ═══════════════════════════════════════════════════ */
    #main {
      margin-right: var(--sidebar-w);
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      transition: margin-right 0.2s;
    }
    #main.collapsed { margin-right: 56px; }

    /* ══ HEADER ═════════════════════════════════════════════════ */
    #header {
      height: var(--header-h);
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .header-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      flex: 1;
    }
    .header-badge {
      font-size: 11px;
      background: var(--amber-light);
      color: var(--amber);
      border: 1px solid #fde68a;
      border-radius: 6px;
      padding: 3px 8px;
      font-weight: 600;
    }

    /* ══ CONTENT ════════════════════════════════════════════════ */
    #content { padding: 28px 28px; flex: 1; max-width: 900px; }

    /* ══ CARDS ══════════════════════════════════════════════════ */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }
    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ══ FORM ═══════════════════════════════════════════════════ */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 5px;
    }
    .field input, .field select, .field textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: var(--accent);
      background: #fff;
    }
    .field .hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .fields-row { display: flex; gap: 16px; }
    .fields-row .field { flex: 1; }

    /* ══ BUTTONS ════════════════════════════════════════════════ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      transition: opacity 0.15s, background 0.15s;
    }
    .btn:hover { opacity: 0.88; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost {
      background: none;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--bg); color: var(--text); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ══ RESULT CARDS ═══════════════════════════════════════════ */
    .result-card {
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 14px;
      position: relative;
      background: var(--card);
      transition: border-color 0.15s;
    }
    .result-card:hover { border-color: var(--accent); }
    .result-rank {
      position: absolute;
      top: -12px;
      right: 16px;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 99px;
    }
    .result-rank.gold   { background: #d97706; }
    .result-rank.silver { background: #64748b; }
    .result-rank.bronze { background: #92400e; }

    .result-name {
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
    }
    .result-reason {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 14px;
      line-height: 1.6;
    }
    .result-specs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .spec-chip {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .spec-chip strong { color: var(--text); }

    /* ══ LOADING ════════════════════════════════════════════════ */
    .loading-overlay {
      display: none;
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }
    .loading-spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══ TOAST ══════════════════════════════════════════════════ */
    #toast-container {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      background: #1e293b;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 4px 12px rgba(0,0,0,.2);
      animation: fadeUp 0.2s ease;
    }
    .toast.error { background: var(--red); }
    .toast.success { background: var(--green); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ══ DISCLAIMER BANNER ══════════════════════════════════════ */
    .disclaimer-banner {
      background: var(--amber-light);
      border: 1px solid #fde68a;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 12.5px;
      color: #92400e;
      margin-bottom: 20px;
      line-height: 1.6;
    }
    .disclaimer-banner strong { color: #78350f; }

    /* ══ EMPTY STATE ════════════════════════════════════════════ */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
    .empty-sub { font-size: 13px; }

    /* ══ USAGE STATS ════════════════════════════════════════════ */
    .usage-stat-chip {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 18px;
      text-align: center;
      min-width: 110px;
    }
    .usage-stat-chip.accent {
      background: var(--accent-light);
      border-color: var(--accent);
    }
    .usage-stat-val {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
    }
    .usage-stat-chip.accent .usage-stat-val { color: var(--accent); }
    .usage-stat-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
    }

    /* ══ UPLOAD ZONE ════════════════════════════════════════════ */
    .upload-zone {
      border: 1.5px dashed #c4d0e3;
      border-radius: var(--radius);
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: #fff;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-light);
    }
    .upload-zone.loading { pointer-events: none; opacity: 0.7; }
    .upload-icon { font-size: 36px; margin-bottom: 10px; }
    .upload-text { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 5px; }
    .upload-sub  { font-size: 12px; color: var(--text-muted); }

    /* ══ MOBILE ═════════════════════════════════════════════════ */
    @media (max-width: 768px) {
      #sidebar { width: 100%; height: auto; position: relative; }
      #main { margin-right: 0; }
      #content { padding: 16px; }
      .fields-row { flex-direction: column; }
    }
  </style>
</head>
<body>

<div id="layout">

  <!-- ══ SIDEBAR ══════════════════════════════════════════════ -->
  <nav id="sidebar">
    <div class="sidebar-logo">
      <span class="sidebar-logo-icon">⚙️</span>
      <div>
        <div class="sidebar-logo-text">הפלדאי</div>
        <div class="sidebar-logo-sub">בחירת פרופיל פלדה</div>
      </div>
    </div>

    <div class="sidebar-nav" id="sidebar-nav">
      <button class="nav-item active" data-view="search" onclick="App.navigate('search')">
        <span class="nav-icon">🔍</span>
        <span class="nav-label">חיפוש פרופיל</span>
      </button>
      <button class="nav-item" data-view="history" onclick="App.navigate('history')">
        <span class="nav-icon">📋</span>
        <span class="nav-label">היסטוריה</span>
      </button>
      <button class="nav-item" data-view="catalog" onclick="App.navigate('catalog')">
        <span class="nav-icon">📚</span>
        <span class="nav-label">קטלוג פרופילים</span>
      </button>
      <button class="nav-item" data-view="settings" onclick="App.navigate('settings')" id="nav-settings">
        <span class="nav-icon">🔑</span>
        <span class="nav-label">הגדרות ושימוש</span>
      </button>
      <button class="nav-item" data-view="about" onclick="App.navigate('about')">
        <span class="nav-icon">ℹ️</span>
        <span class="nav-label">אודות</span>
      </button>
    </div>

    <div class="sidebar-disclaimer">
      כלי עזר לבחירת פרופיל בלבד.<br>
      אינו מחשב עומסים או תכן הנדסי.<br>
      האחריות על המהנדס בלבד.
    </div>

    <div class="sidebar-footer">
      הפלדאי v1.0
    </div>

    <div class="sidebar-toggle" id="sidebar-toggle" onclick="App.toggleSidebar()">◀</div>
  </nav>

  <!-- ══ MAIN ═════════════════════════════════════════════════ -->
  <div id="main">
    <header id="header">
      <div class="header-title" id="header-title">חיפוש פרופיל פלדה</div>
      <div class="header-badge">⚠️ לשימוש מהנדסים בלבד</div>
    </header>

    <main id="content">
      <!-- מולאות על ידי app.js -->
    </main>
  </div>

</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script src="catalog.json" type="application/json" id="catalog-data"></script>
<script src="app.js"></script>
<script src="modules/search.js"></script>
<script src="modules/history.js"></script>
<script src="modules/catalog-view.js"></script>
<script src="modules/settings.js"></script>
<script src="modules/about.js"></script>

</body>
</html>
